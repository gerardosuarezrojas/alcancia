<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alcancía</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #1c1c1e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }
  #header {
    text-align: center;
    padding: 18px 10px 14px;
    background: #1c1c1e;
    border-bottom: 1px solid #333;
  }
  #total-label {
    color: #8e8e93;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 0 0 4px;
  }
  #total {
    color: #ffffff;
    font-size: 42px;
    font-weight: 700;
    margin: 0;
    transition: transform 0.12s ease;
  }
  #total.bump { transform: scale(1.08); }

  #mode-bar {
    display: flex;
    justify-content: center;
    padding: 10px 0 4px;
    background: #1c1c1e;
  }
  #mode-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 20px;
    border-radius: 999px;
    border: 1.5px solid #3a3a3c;
    background: #2c2c2e;
    color: #d1d1d6;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.15s ease;
  }
  #mode-toggle.active {
    background: #ff3b30;
    border-color: #ff3b30;
    color: #fff;
  }
  #mode-toggle .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #34c759;
  }
  #mode-toggle.active .dot { background: #fff; }

  #grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    background: #333;
  }
  .coin-cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1c1c1e;
    overflow: hidden;
  }
  .coin-cell:active { background: #2c2c2e; }
  .coin-cell.subtracting { background: #2a1414; }

  .coin-svg { width: 42%; max-width: 150px; touch-action: manipulation; }

  .coin-count {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: #8e8e93;
    font-size: 13px;
    font-weight: 500;
  }

  .minus-badge {
    position: absolute;
    top: 12px;
    right: 16px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #ff3b30;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .coin-cell.subtracting .minus-badge { display: flex; }

  .float-pop {
    position: absolute;
    font-size: 20px;
    font-weight: 700;
    pointer-events: none;
    animation: floatUp 0.6s ease-out forwards;
    z-index: 5;
  }
  .float-pop.add { color: #34c759; }
  .float-pop.sub { color: #ff3b30; }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }

  #reset-bar {
    text-align: center;
    padding: 10px;
    background: #1c1c1e;
    border-top: 1px solid #333;
  }
  #reset-btn {
    background: none;
    border: none;
    color: #636366;
    font-size: 12px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <p id="total-label">Total guardado</p>
    <h1 id="total">$0</h1>
  </div>

  <div id="mode-bar">
    <button id="mode-toggle">
      <span class="dot"></span>
      <span id="mode-text">Modo: sumar</span>
    </button>
  </div>

  <div id="grid">
    <div class="coin-cell" data-value="10">
      <div class="minus-badge">−</div>
      <svg class="coin-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="#D4A94A" stroke="#8a6d1f" stroke-width="3"/>
        <circle cx="50" cy="50" r="37" fill="none" stroke="#8a6d1f" stroke-width="1.5"/>
        <text x="50" y="62" text-anchor="middle" font-size="34" font-weight="700" fill="#5c4712" font-family="Arial">$10</text>
      </svg>
      <div class="coin-count" data-count="10">0 monedas</div>
    </div>
    <div class="coin-cell" data-value="5">
      <div class="minus-badge">−</div>
      <svg class="coin-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="#C7C7CC" stroke="#7a7a7e" stroke-width="3"/>
        <circle cx="50" cy="50" r="37" fill="none" stroke="#7a7a7e" stroke-width="1.5"/>
        <text x="50" y="62" text-anchor="middle" font-size="34" font-weight="700" fill="#4a4a4e" font-family="Arial">$5</text>
      </svg>
      <div class="coin-count" data-count="5">0 monedas</div>
    </div>
    <div class="coin-cell" data-value="2">
      <div class="minus-badge">−</div>
      <svg class="coin-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="#E0B970" stroke="#96741f" stroke-width="3"/>
        <circle cx="50" cy="50" r="37" fill="none" stroke="#96741f" stroke-width="1.5"/>
        <text x="50" y="62" text-anchor="middle" font-size="34" font-weight="700" fill="#5c4712" font-family="Arial">$2</text>
      </svg>
      <div class="coin-count" data-count="2">0 monedas</div>
    </div>
    <div class="coin-cell" data-value="1">
      <div class="minus-badge">−</div>
      <svg class="coin-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="#D6D6DA" stroke="#88888c" stroke-width="3"/>
        <circle cx="50" cy="50" r="37" fill="none" stroke="#88888c" stroke-width="1.5"/>
        <text x="50" y="62" text-anchor="middle" font-size="34" font-weight="700" fill="#4a4a4e" font-family="Arial">$1</text>
      </svg>
      <div class="coin-count" data-count="1">0 monedas</div>
    </div>
  </div>

  <div id="reset-bar">
    <button id="reset-btn">Reiniciar alcancía</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'alcancia-state';
let state = { total: 0, counts: { 10: 0, 5: 0, 2: 0, 1: 0 } };
let subMode = false;

const totalEl = document.getElementById('total');
const modeToggle = document.getElementById('mode-toggle');
const modeText = document.getElementById('mode-text');
const cells = document.querySelectorAll('.coin-cell');

function formatMoney(n) {
  return '$' + n.toLocaleString('es-MX');
}

function render() {
  totalEl.textContent = formatMoney(state.total);
  cells.forEach(cell => {
    const val = cell.dataset.value;
    const countEl = cell.querySelector('.coin-count');
    const c = state.counts[val] || 0;
    countEl.textContent = c + (c === 1 ? ' moneda' : ' monedas');
  });
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('No se pudo guardar', e);
  }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed.total === 'number') {
        state = parsed;
      }
    }
  } catch (e) {
    // no hay datos guardados todavia
  }
  render();
}

function bump() {
  totalEl.classList.remove('bump');
  void totalEl.offsetWidth;
  totalEl.classList.add('bump');
}

function showFloat(cell, text, cls) {
  const pop = document.createElement('div');
  pop.className = 'float-pop ' + cls;
  pop.textContent = text;
  pop.style.left = '50%';
  pop.style.top = '38%';
  pop.style.transform = 'translateX(-50%)';
  cell.appendChild(pop);
  setTimeout(() => pop.remove(), 650);
}

cells.forEach(cell => {
  cell.addEventListener('click', () => {
    const val = parseInt(cell.dataset.value, 10);
    if (subMode) {
      if ((state.counts[val] || 0) <= 0 || state.total < val) return;
      state.counts[val] = Math.max(0, (state.counts[val] || 0) - 1);
      state.total = Math.max(0, state.total - val);
      showFloat(cell, '-' + val, 'sub');
    } else {
      state.counts[val] = (state.counts[val] || 0) + 1;
      state.total = state.total + val;
      showFloat(cell, '+' + val, 'add');
    }
    bump();
    render();
    save();
  });
});

modeToggle.addEventListener('click', () => {
  subMode = !subMode;
  modeToggle.classList.toggle('active', subMode);
  modeText.textContent = subMode ? 'Modo: restar' : 'Modo: sumar';
  cells.forEach(cell => cell.classList.toggle('subtracting', subMode));
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('¿Seguro que quieres reiniciar la alcancía a $0?')) {
    state = { total: 0, counts: { 10: 0, 5: 0, 2: 0, 1: 0 } };
    render();
    save();
  }
});

load();
</script>
</body>
</html>
